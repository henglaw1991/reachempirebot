<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup - ReachEmpire</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0b1f3a, #142f5a);
    color: #333;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.card {
    background: #fff;
    padding: 40px;
    border-radius: 16px;
    width: 100%;
    max-width: 800px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

h1 {
    text-align: center;
    margin-bottom: 10px;
    color: #0b1f3a;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #666;
    margin-bottom: 30px;
}

.row {
    display: flex;
    gap: 15px;
}

.input-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    margin-bottom: 20px;
}

label {
    font-size: 13px;
    margin-bottom: 6px;
    color: #555;
}

input, select {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    transition: 0.3s;
}

input:focus, select:focus {
    border-color: #2d6cdf;
    outline: none;
    box-shadow: 0 0 5px rgba(45,108,223,0.3);
}

.contact-box {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.contact-option {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.contact-option:hover {
    border-color: #2d6cdf;
    background: #f5f8ff;
}

.contact-option input {
    margin-right: 8px;
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #2d6cdf, #1c4bb8);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

@media (max-width: 600px) {
    .row {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>Create Your Account</h1>
<p class="subtitle">Submit your request. Admin will review and activate your trading access.</p>

<form>

<div class="row">
    <div class="input-group">
        <label>First Name</label>
        <input type="text">
    </div>

    <div class="input-group">
        <label>Last Name</label>
        <input type="text">
    </div>
</div>

<div class="row">
    <div class="input-group">
        <label>Country</label>
        <select>
            <option>Cambodia</option>
            <option>Thailand</option>
            <option>Vietnam</option>
        </select>
    </div>

    <div class="input-group">
        <label>Phone</label>
        <input type="text" placeholder="+855...">
    </div>
</div>

<label>Contact Preference</label>
<div class="contact-box">
    <label class="contact-option">
        <input type="checkbox"> Telegram
    </label>
    <label class="contact-option">
        <input type="checkbox"> WhatsApp
    </label>
</div>

<div class="input-group">
    <label>Username</label>
    <input type="text">
</div>

<div class="row">
    <div class="input-group">
        <label>Password</label>
        <input type="password">
    </div>

    <div class="input-group">
        <label>Confirm Password</label>
        <input type="password">
    </div>
</div>

<button type="submit">Submit Signup Request</button>

</form>

</div>
</div>

</body>
</html>
